name: Test Suite

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: argus
          POSTGRES_PASSWORD: argus
          POSTGRES_DB: argus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api-service
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://argus:argus@localhost:5432/argus_test

      - name: Run Prisma migrations
        working-directory: apps/api-service
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://argus:argus@localhost:5432/argus_test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npm run lint -- --max-warnings 0 2>/dev/null || echo "Lint warnings exist (non-blocking)"

      - name: Run tests with coverage
        run: npx jest --coverage --passWithNoTests
        env:
          DATABASE_URL: postgresql://argus:argus@localhost:5432/argus_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
