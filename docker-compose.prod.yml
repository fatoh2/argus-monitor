version: '3.8'

services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/argus
    depends_on:
      - db
    # Add any other necessary production configurations here

  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    # Add any other necessary production configurations here

volumes:
  db_data:
