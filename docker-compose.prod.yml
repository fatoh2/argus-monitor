version: '3.8'

services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:14-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
      POSTGRES_DB: 
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    command: redis-server --requirepass 
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
