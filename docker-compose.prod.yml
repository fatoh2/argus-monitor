version: '3.8'

services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
    # Optional: Expose API service if needed, but typically accessed via a reverse proxy
    # ports:
    #   - "3000:3000"

  db:
    image: postgres:14-alpine
    env_file:
      - .env
    # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB are read from .env
    volumes:
      - db_data:/var/lib/postgresql/data
    # Optional: Expose database if needed for external tools, but generally not recommended
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # Optional: Expose Redis if needed for external tools, but generally not recommended
    # ports:
    #   - "6379:6379"

volumes:
  db_data:
  redis_data:
